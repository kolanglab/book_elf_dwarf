---
title: ELF/DWARF 入門
language: ja
audience: 学部3年生くらいで、プログラミング言語処理系初心者
notes: |-
  バイナリフォーマットの ELF, DWARF について、それぞれ詳説する。
  概要から、詳細、という流れになっていて欲しい。
  詳細なので、具体的な仕様をバンバン紹介してほしい。全仕様を網羅できるといいが、まぁ、全部はデカすぎるとおもうので、よく利用するところまで。
  最後に ELF/DWARF ハンズオンで何か実際に作る様子を紹介してほしい。
  DWARF については、何がわかり、何がわからないか、理解できるところまでやってほしい。
  ELF 部、DWARF 部、みたいに分けたほうがいいかな？　どっちが理解しやすいかわからないので、検討してわかりやすい流れのほうを採用してほしい。

  注意:
  * 未使用用語は説明する
  * 例だけの (sub)section は作らない。ちゃんと説明する
  * コードを出すだけの (sub)section は作らない。ちゃんと説明する
  * 参考文献は積極的に引用する
  * 言語処理系のプログラムの例を出すときはなるべく Ruby を使う。ただ、今回は C じゃないと厳しそうかな。
